<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivinha a Palavra</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">

    <!-- Header -->
    <div class="text-center mb-4">
      <h1 class="game-title">&#127279; Adivinha a Palavra</h1>
      <div class="d-flex justify-content-center align-items-center gap-3 mt-3 flex-wrap">
        <select id="theme-select" class="form-select theme-select">
          <option value="all">Todos os temas</option>
        </select>
        <div class="score-badge">
          <i class="bi bi-star-fill"></i>
          <span id="score">0 / 0</span>
        </div>
      </div>
      <div id="word-counter" class="text-muted small mt-2">A carregar...</div>
    </div>

    <!-- Game Card -->
    <div class="game-card mx-auto">

      <!-- Image -->
      <div class="image-area">
        <div id="loading-spinner" class="spinner-border text-primary" role="status">
          <span class="visually-hidden">A carregar...</span>
        </div>
        <img id="game-image" src="" alt="Imagem da palavra" class="game-image d-none">
      </div>

      <!-- Feedback -->
      <div id="feedback" class="feedback d-none"></div>

      <!-- Word Boxes -->
      <div id="word-boxes" class="word-boxes-container"></div>

      <!-- Letter Tiles -->
      <div id="letter-tiles" class="letter-tiles-container"></div>

      <!-- Controls -->
      <div class="controls">
        <button id="clear-btn" class="btn btn-outline-secondary btn-lg">
          <i class="bi bi-arrow-counterclockwise"></i> Limpar
        </button>
        <button id="next-btn" class="btn btn-primary btn-lg">
          Próxima <i class="bi bi-arrow-right"></i>
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
